<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday Anusha ❤️</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#120018,#4b006e);color:#fff;text-align:center;overflow:hidden}
#gift{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;cursor:pointer}
#main{display:none;padding:20px;overflow:auto;height:100vh}
h1{text-shadow:0 0 20px hotpink}
img{width:45%;max-width:220px;border-radius:20px;margin:8px}
.heart{position:fixed;bottom:-30px;animation:up 8s linear forwards}
@keyframes up{to{transform:translateY(-120vh);opacity:0}}
</style></head><body>
<div id="gift"><div style="font-size:120px">🎁</div><h2>Click To Open Your Gift</h2></div>
<div id="main">
<h1>🎉 Happy Birthday<br>Anusha Pariyar ❤️</h1>
<img src="IMG_20260721_183223_522.jpg"><img src="IMG_20260721_183220_900.jpg">
<p id="msg"></p>
<audio id="music" loop><source src="happy-birthday.mp3.mp3" type="audio/mpeg"></audio>
</div>
<script>
const text=`Happy Birthday, My Love ❤️

Every moment with you is special.
Your smile makes my world brighter.
I wish you endless happiness and success.

I Love You Forever ❤️

— Prince Gupta`;
gift.onclick=()=>{
gift.style.display="none";
main.style.display="block";
music.play().catch(()=>{});
let i=0;(function t(){if(i<text.length){msg.textContent+=text[i++];setTimeout(t,40)}})();
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent='❤️';h.style.left=Math.random()*100+'vw';h.style.fontSize=(20+Math.random()*20)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),8000)},400);
};
</script></body></html>
