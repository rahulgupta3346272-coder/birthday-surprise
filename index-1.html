<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday Anusha ❤️</title>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#12001f,#3a005f,#ff4fa3);color:#fff;overflow:hidden}
#gift,#main{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh}
#main{display:none;padding:20px;overflow:auto}
#box{font-size:120px;animation:bob 2s infinite;cursor:pointer}
@keyframes bob{50%{transform:translateY(-15px)}}
h1{text-shadow:0 0 20px hotpink}
img{width:45%;max-width:220px;border-radius:20px;margin:8px}
.heart{position:fixed;bottom:-20px;animation:up 8s linear forwards}
@keyframes up{to{transform:translateY(-120vh);opacity:0}}
</style></head><body>
<div id="gift"><div id="box">🎁</div><h2>Tap to Open Your Gift</h2></div>
<div id="main">
<h1>🎉 Happy Birthday<br>Anusha Pariyar ❤️</h1>
<img src="IMG_20260721_183223_522.jpg"><img src="IMG_20260721_183220_900.jpg">
<p style="max-width:600px;text-align:center;font-size:20px">Happy Birthday, My Love ❤️<br><br>Every moment with you is special. Your smile makes my world brighter. I wish you endless happiness, success and love.<br><br>I Love You Forever ❤️<br><br>— Prince Gupta</p>
<audio id="music" loop><source src="happy-birthday.mp3.mp3" type="audio/mpeg"></audio>
</div>
<script>
box.onclick=()=>{gift.style.display='none';main.style.display='flex';music.play().catch(()=>{});setInterval(()=>{let h=document.createElement('div');h.className='heart';h.innerHTML='❤️';h.style.left=Math.random()*100+'vw';h.style.fontSize=(20+Math.random()*20)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),8000)},300)}
</script></body></html>
